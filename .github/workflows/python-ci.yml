# Python CI/CD workflow untuk Library Management System
#
# Triggers:
#   - push ke branch main
#   - pull_request ke branch main
#
# Steps:
#   1. Checkout repository
#   2. Setup Python 3.12
#   3. Install dependencies
#   4. Compile check (compileall)
#   5. Run test suite (pytest)
#   6. Run coverage report (if plugin available)

name: Python CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python --version

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest pytest-cov

      - name: Compile check (compileall)
        run: python -m compileall library_system

      - name: Run tests with pytest
        run: pytest -v

      - name: Run tests with coverage
        run: pytest --cov=library_system --cov-report=term-missing
